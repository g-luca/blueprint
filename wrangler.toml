name = "blueprint"
compatibility_date = "2026-02-24"
main = "worker/index.ts"

[vars]
CORS_ORIGIN = "*"
RATE_LIMIT = "10"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[durable_objects]
bindings = [
  { name = "BLUEPRINT_ROOM",       class_name = "BlueprintRoom"    },
  { name = "ROOM_RATE_LIMITER",    class_name = "RoomRateLimiter"  },
]

[[migrations]]
tag = "v1"
new_classes = ["BlueprintRoom"]

[[migrations]]
tag = "v2"
new_classes = ["RoomRateLimiter"]
